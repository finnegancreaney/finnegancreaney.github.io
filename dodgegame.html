<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dodge War</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
#hud{display:flex;gap:20px;align-items:center;padding:10px 20px;width:100%;max-width:600px;justify-content:space-between}
.hud-item{color:#fff;font-size:.9em;letter-spacing:1px}
.hud-item span{color:#00e5ff;font-weight:bold;font-size:1.1em}
#lives-display{display:flex;gap:5px}
.life-dot{width:12px;height:12px;border-radius:50%;background:#ff4455;box-shadow:0 0 6px #ff4455}
.life-dot.empty{background:#333;box-shadow:none}
#canvas-wrap{position:relative}
canvas{display:block;border:1px solid #1a1a2e;border-radius:4px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);border-radius:4px;gap:14px}
#overlay h1{color:#00e5ff;font-size:2em;letter-spacing:4px;text-shadow:0 0 20px #00e5ff}
#overlay .sub{color:#888;font-size:.85em;letter-spacing:2px}
#overlay .score-big{color:#fff;font-size:1.4em}
#overlay .score-big span{color:#ffd700;font-size:1.3em}
.play-btn{background:linear-gradient(135deg,#00e5ff,#0077ff);border:none;color:#000;padding:12px 40px;border-radius:30px;font-size:1.1em;font-weight:bold;cursor:pointer;letter-spacing:2px;box-shadow:0 0 20px rgba(0,229,255,0.4);transition:all .2s}
.play-btn:hover{transform:scale(1.06);box-shadow:0 0 30px rgba(0,229,255,0.7)}
#controls-hint{color:#555;font-size:.75em;text-align:center;line-height:1.8;margin-top:4px}
#wave-announce{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:2em;font-weight:bold;letter-spacing:3px;text-shadow:0 0 20px #ffd700;pointer-events:none;opacity:0;transition:opacity .3s}
#back-btn{position:fixed;top:12px;left:12px;background:rgba(0,0,0,0.6);border:1px solid #333;color:#888;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:.8em;z-index:100;text-decoration:none}
#back-btn:hover{color:#fff;border-color:#555}
#powerup-bar{display:flex;gap:8px;padding:6px 20px;width:100%;max-width:600px;min-height:28px}
.pu-badge{padding:3px 10px;border-radius:10px;font-size:.72em;font-weight:bold;letter-spacing:1px;animation:pu-in .3s ease}
@keyframes pu-in{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
.pu-shield{background:#1a3a6b;color:#88aaff;border:1px solid #3355aa}
.pu-slow{background:#1a3a1a;color:#88ff88;border:1px solid #33aa55}
.pu-magnet{background:#3a1a1a;color:#ffaa88;border:1px solid #aa5533}
</style>
</head>
<body>
<a href="javascript:history.back()" id="back-btn">← Back</a>

<div id="hud">
  <div class="hud-item">SCORE <span id="score-val">0</span></div>
  <div class="hud-item">WAVE <span id="wave-val">1</span></div>
  <div class="hud-item">BEST <span id="best-val">0</span></div>
  <div id="lives-display"></div>
</div>
<div id="powerup-bar"></div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>DODGE WAR</h1>
    <div class="sub">SURVIVE THE ONSLAUGHT</div>
    <button class="play-btn" id="play-btn">PLAY</button>
    <div id="controls-hint">
      WASD / Arrow Keys / Mouse to move<br>
      Touch &amp; drag on mobile
    </div>
  </div>
  <div id="wave-announce"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score-val');
const waveEl = document.getElementById('wave-val');
const bestEl = document.getElementById('best-val');
const livesEl = document.getElementById('lives-display');
const puBar = document.getElementById('powerup-bar');
const waveAnn = document.getElementById('wave-announce');

// ── SIZING ──
function resize(){
  const maxW = Math.min(window.innerWidth - 10, 580);
  const maxH = Math.min(window.innerHeight - 130, 520);
  const s = Math.min(maxW, maxH);
  canvas.width = s; canvas.height = s;
}
resize();
window.addEventListener('resize', ()=>{ resize(); if(!running) drawIdle(); });

// ── STATE ──
let running=false, dead=false, paused=false;
let score=0, best=parseInt(localStorage.getItem('dw_best')||'0');
let wave=1, waveKills=0, waveKillsNeeded=10;
let lives=3, maxLives=3;
let iframes=0;
let activePerks=[];
const PERK_TYPES=['shield','slow','magnet'];

const keys={};
let mx=canvas.width/2, my=canvas.height/2, mouseActive=false;
let touchX=null, touchY=null;

// ── ENTITIES ──
let player, bullets=[], enemies=[], particles=[], powerups=[], orbs=[];
let scorePopups=[];

function mkPlayer(){
  return {
    x:canvas.width/2, y:canvas.height/2,
    r:10, speed:3.5,
    trail:[], shielded:false, shieldTimer:0,
    invincible:false, invTimer:0,
  };
}

function mkBullet(x,y,vx,vy,r,color,dmg){
  return {x,y,vx,vy,r:r||5,color:color||'#ff4455',dmg:dmg||1,life:1};
}

function mkEnemy(type){
  const W=canvas.width, H=canvas.height;
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-20}
  else if(side===1){x=W+20;y=Math.random()*H}
  else if(side===2){x=Math.random()*W;y=H+20}
  else{x=-20;y=Math.random()*H}
  return {x,y,type,r:type==='tank'?16:type==='fast'?7:11,hp:type==='tank'?4:1,maxHp:type==='tank'?4:1,speed:type==='fast'?3.2:type==='tank'?1.2:2,color:type==='tank'?'#ff8800':type==='fast'?'#ff00cc':'#ff4455',shootTimer:0,life:1};
}

function mkPowerup(x,y){
  const t=PERK_TYPES[Math.floor(Math.random()*PERK_TYPES.length)];
  const cols={shield:'#4488ff',slow:'#44ff88',magnet:'#ff8844'};
  return {x,y,type:t,r:10,bob:Math.random()*Math.PI*2,color:cols[t],life:1};
}

function mkOrb(x,y){
  return {x,y,r:5,life:1,bob:Math.random()*Math.PI*2};
}

function mkParticle(x,y,color,count){
  for(let i=0;i<(count||8);i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,color,life:1,decay:0.025+Math.random()*0.03});
  }
}

// ── WAVE CONFIG ──
function waveConfig(w){
  return {
    killsNeeded: 8 + w*4,
    spawnInterval: Math.max(400, 1800 - w*80),
    bulletSpeed: 2.5 + w*0.18,
    enemyTypes: w<3?['basic']:w<5?['basic','fast']:w<8?['basic','fast','tank']:['basic','fast','tank'],
    typeWeights: w<3?[1,0,0]:w<5?[0.6,0.4,0]:w<8?[0.5,0.3,0.2]:[0.4,0.35,0.25],
    shootInterval: Math.max(500, 1600-w*60),
  };
}

let spawnTimer=0, cfg=waveConfig(1);

// ── INPUT ──
document.addEventListener('keydown',e=>{keys[e.key]=true});
document.addEventListener('keyup',e=>{keys[e.key]=false});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mx=e.clientX-r.left; my=e.clientY-r.top; mouseActive=true;
});
canvas.addEventListener('mouseleave',()=>{mouseActive=false});

canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();touchX=t.clientX-r.left;touchY=t.clientY-r.top},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();touchX=t.clientX-r.left;touchY=t.clientY-r.top},{passive:false});
canvas.addEventListener('touchend',()=>{touchX=null;touchY=null});

function getInput(){
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) dy+=1;
  if(touchX!==null && touchY!==null){
    const ddx=touchX-player.x, ddy=touchY-player.y;
    const dist=Math.hypot(ddx,ddy);
    if(dist>8){dx=ddx/dist;dy=ddy/dist;}
  } else if(mouseActive){
    const ddx=mx-player.x, ddy=my-player.y;
    const dist=Math.hypot(ddx,ddy);
    if(dist>8){dx=ddx/dist;dy=ddy/dist;}
  }
  const len=Math.hypot(dx,dy);
  if(len>1){dx/=len;dy/=len;}
  return{dx,dy};
}

// ── GAME LOGIC ──
let lastTime=0;
function gameLoop(ts){
  if(!running) return;
  const dt=Math.min(ts-lastTime,50);
  lastTime=ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  if(dead) return;
  iframes=Math.max(0,iframes-dt);

  // player movement
  const {dx,dy}=getInput();
  const spd = player.speed * (hasPerk('slow')?1.15:1);
  player.x=Math.max(player.r,Math.min(canvas.width-player.r, player.x+dx*spd));
  player.y=Math.max(player.r,Math.min(canvas.height-player.r, player.y+dy*spd));

  // trail
  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>14) player.trail.shift();

  // shield timer
  if(player.shielded){ player.shieldTimer-=dt; if(player.shieldTimer<=0){player.shielded=false;removePerk('shield');} }

  // perk timers
  activePerks.forEach(p=>p.timer-=dt);
  activePerks=activePerks.filter(p=>p.timer>0);
  renderPerkBar();

  // spawn
  spawnTimer-=dt;
  if(spawnTimer<=0){
    spawnTimer=cfg.spawnInterval;
    spawnEnemy();
  }

  // enemies
  enemies.forEach(e=>{
    const dx2=player.x-e.x, dy2=player.y-e.y;
    const dist=Math.hypot(dx2,dy2);
    e.x+=dx2/dist*e.speed*(hasPerk('slow')?0.45:1);
    e.y+=dy2/dist*e.speed*(hasPerk('slow')?0.45:1);
    // shoot
    if(e.type==='basic'||e.type==='tank'){
      e.shootTimer-=(dt*(hasPerk('slow')?0.45:1));
      if(e.shootTimer<=0){
        e.shootTimer=cfg.shootInterval+(Math.random()*400);
        const a=Math.atan2(player.y-e.y,player.x-e.x);
        const spd2=cfg.bulletSpeed+(e.type==='tank'?0.5:0);
        bullets.push(mkBullet(e.x,e.y,Math.cos(a)*spd2,Math.sin(a)*spd2,e.type==='tank'?7:5,e.type==='tank'?'#ff8800':'#ff3366'));
      }
    }
    if(e.type==='fast'){
      // spreads bullets
      e.shootTimer-=(dt*(hasPerk('slow')?0.45:1));
      if(e.shootTimer<=0){
        e.shootTimer=(cfg.shootInterval*1.6)+(Math.random()*300);
        const base=Math.atan2(player.y-e.y,player.x-e.x);
        [-0.25,0,0.25].forEach(off=>{
          bullets.push(mkBullet(e.x,e.y,Math.cos(base+off)*cfg.bulletSpeed*1.2,Math.sin(base+off)*cfg.bulletSpeed*1.2,4,'#ff00cc'));
        });
      }
    }
    // ram player
    if(dist<e.r+player.r && iframes<=0 && !player.shielded){
      hit();
    }
  });

  // bullets
  bullets.forEach(b=>{
    b.x+=b.vx*(hasPerk('slow')?0.45:1);
    b.y+=b.vy*(hasPerk('slow')?0.45:1);
    if(b.x<-20||b.x>canvas.width+20||b.y<-20||b.y>canvas.height+20) b.life=0;
    const dist=Math.hypot(b.x-player.x,b.y-player.y);
    if(dist<b.r+player.r){
      b.life=0;
      if(player.shielded){ mkParticle(b.x,b.y,'#4488ff',6); }
      else if(iframes<=0){ hit(); }
    }
  });
  bullets=bullets.filter(b=>b.life>0);

  // powerups
  powerups.forEach(p=>{
    p.bob+=0.05;
    p.y+=Math.sin(p.bob)*0.3;
    if(hasPerk('magnet')){
      const ddx=player.x-p.x,ddy=player.y-p.y;
      const d=Math.hypot(ddx,ddy);
      if(d<150){p.x+=ddx/d*4;p.y+=ddy/d*4;}
    }
    if(Math.hypot(p.x-player.x,p.y-player.y)<p.r+player.r){
      collectPerk(p.type); p.life=0;
      mkParticle(p.x,p.y,p.color,10);
    }
  });
  powerups=powerups.filter(p=>p.life>0);

  // orbs
  orbs.forEach(o=>{
    o.bob+=0.07;
    const ddx=player.x-o.x,ddy=player.y-o.y,d=Math.hypot(ddx,ddy);
    const pull=(hasPerk('magnet')||d<80)?5:0;
    if(pull>0){o.x+=ddx/d*pull;o.y+=ddy/d*pull;}
    if(d<o.r+player.r){
      score+=5; scoreEl.textContent=score;
      scorePopups.push({x:o.x,y:o.y,text:'+5',life:1,color:'#ffd700'});
      o.life=0;
    }
  });
  orbs=orbs.filter(o=>o.life>0);

  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.92;p.vy*=0.92});
  particles=particles.filter(p=>p.life>0);

  // score popups
  scorePopups.forEach(p=>{p.y-=0.8;p.life-=0.025});
  scorePopups=scorePopups.filter(p=>p.life>0);

  // score over time
  score+=dt*0.01*wave;
  scoreEl.textContent=Math.floor(score);
}

function spawnEnemy(){
  const r=Math.random();
  let cum=0, t='basic';
  for(let i=0;i<cfg.enemyTypes.length;i++){
    cum+=cfg.typeWeights[i];
    if(r<cum){t=cfg.enemyTypes[i];break;}
  }
  enemies.push(mkEnemy(t));
}

function killEnemy(e, bx, by){
  mkParticle(e.x,e.y,e.color,12);
  const pts=e.type==='tank'?30:e.type==='fast'?20:10;
  score+=pts*wave;
  scorePopups.push({x:e.x,y:e.y,text:'+'+pts*wave,life:1,color:'#ffd700'});
  if(Math.random()<0.15) powerups.push(mkPowerup(e.x,e.y));
  for(let i=0;i<3;i++) orbs.push(mkOrb(e.x+(-10+Math.random()*20),e.y+(-10+Math.random()*20)));
  e.life=0;
  waveKills++;
  if(waveKills>=cfg.killsNeeded) nextWave();
}

function nextWave(){
  wave++;
  waveKills=0;
  cfg=waveConfig(wave);
  waveEl.textContent=wave;
  enemies=[];
  bullets=[];
  // flash wave announce
  waveAnn.textContent='WAVE '+wave;
  waveAnn.style.opacity='1';
  setTimeout(()=>{waveAnn.style.opacity='0';},1200);
  // heal every 3 waves
  if(wave%3===0 && lives<maxLives){ lives=Math.min(maxLives,lives+1); renderLives(); }
}

function hit(){
  lives--;
  renderLives();
  iframes=2000;
  mkParticle(player.x,player.y,'#ff4455',16);
  if(lives<=0){ gameOver(); return; }
  // brief invincibility flash
  player.shielded=false;
}

function gameOver(){
  dead=true;
  running=false;
  if(score>best){ best=Math.floor(score); localStorage.setItem('dw_best',best); bestEl.textContent=best; }
  setTimeout(()=>showOverlay(true),600);
}

// ── PERKS ──
function hasPerk(t){ return activePerks.some(p=>p.type===t); }
function removePerk(t){ activePerks=activePerks.filter(p=>p.type!==t); renderPerkBar(); }
function collectPerk(t){
  const dur={shield:6000,slow:7000,magnet:8000};
  const existing=activePerks.find(p=>p.type===t);
  if(existing) existing.timer=dur[t];
  else activePerks.push({type:t,timer:dur[t]});
  if(t==='shield'){ player.shielded=true; player.shieldTimer=dur.shield; }
  renderPerkBar();
}
function renderPerkBar(){
  const labels={shield:'🛡 SHIELD',slow:'❄ SLOW TIME',magnet:'🧲 MAGNET'};
  const cls={shield:'pu-shield',slow:'pu-slow',magnet:'pu-magnet'};
  puBar.innerHTML=activePerks.map(p=>`<span class="pu-badge ${cls[p.type]}">${labels[p.type]} ${(p.timer/1000).toFixed(1)}s</span>`).join('');
}
function renderLives(){
  livesEl.innerHTML='';
  for(let i=0;i<maxLives;i++){
    const d=document.createElement('div');
    d.className='life-dot'+(i>=lives?' empty':'');
    livesEl.appendChild(d);
  }
}

// ── DRAW ──
function draw(){
  const W=canvas.width, H=canvas.height;
  // background
  ctx.fillStyle='#090912';
  ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // orbs
  orbs.forEach(o=>{
    ctx.globalAlpha=0.8;
    ctx.fillStyle='#ffd700';
    ctx.shadowBlur=8;ctx.shadowColor='#ffd700';
    ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  // powerups
  powerups.forEach(p=>{
    ctx.globalAlpha=0.9;
    ctx.fillStyle=p.color;
    ctx.shadowBlur=12;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    const icons={shield:'🛡',slow:'❄',magnet:'🧲'};
    ctx.font='10px sans-serif';
    ctx.fillText(icons[p.type]||'?',p.x,p.y+3);
  });
  ctx.globalAlpha=1;

  // bullets
  bullets.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.shadowBlur=8;ctx.shadowColor=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // enemies
  enemies.forEach(e=>{
    // glow
    ctx.fillStyle=e.color;
    ctx.shadowBlur=12;ctx.shadowColor=e.color;
    if(e.type==='tank'){
      ctx.fillRect(e.x-e.r,e.y-e.r,e.r*2,e.r*2);
      // hp bar
      ctx.fillStyle='#222';ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,4);
      ctx.fillStyle='#ff8800';ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*(e.hp/e.maxHp),4);
    } else {
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  });

  // player trail
  player.trail.forEach((t,i)=>{
    const a=(i/player.trail.length)*0.3;
    ctx.globalAlpha=a;
    ctx.fillStyle='#00e5ff';
    ctx.beginPath();ctx.arc(t.x,t.y,player.r*0.5,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // player
  const shimmer=iframes>0 && Math.floor(iframes/100)%2===0;
  if(!shimmer){
    if(player.shielded){
      ctx.strokeStyle='#4488ff';ctx.lineWidth=3;
      ctx.shadowBlur=16;ctx.shadowColor='#4488ff';
      ctx.beginPath();ctx.arc(player.x,player.y,player.r+5,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }
    ctx.fillStyle='#00e5ff';
    ctx.shadowBlur=16;ctx.shadowColor='#00e5ff';
    ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
    // inner dot
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(player.x,player.y,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // score popups
  scorePopups.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
  });
  ctx.globalAlpha=1;

  // wave kill progress (bottom bar)
  const prog=Math.min(waveKills/cfg.killsNeeded,1);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(0,canvas.height-4,canvas.width,4);
  ctx.fillStyle='#ffd700';
  ctx.fillRect(0,canvas.height-4,canvas.width*prog,4);
}

function drawIdle(){
  ctx.fillStyle='#090912';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ── OVERLAY ──
function showOverlay(isGameOver){
  overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>${isGameOver?'GAME OVER':'DODGE WAR'}</h1>
    <div class="sub">${isGameOver?'YOU\'VE BEEN HIT':'SURVIVE THE ONSLAUGHT'}</div>
    ${isGameOver?`<div class="score-big">SCORE <span>${Math.floor(score)}</span></div>
    <div class="score-big">BEST <span>${best}</span></div>`:''}
    <button class="play-btn" id="play-btn">${isGameOver?'PLAY AGAIN':'PLAY'}</button>
    <div id="controls-hint">WASD / Arrows / Mouse / Touch to move<br>Collect power-ups — Shield 🛡 Slow ❄ Magnet 🧲<br>Kill enemies to advance waves</div>
  `;
  document.getElementById('play-btn').onclick=startGame;
}

function startGame(){
  overlay.style.display='none';
  player=mkPlayer();
  bullets=[];enemies=[];particles=[];powerups=[];orbs=[];scorePopups=[];activePerks=[];
  score=0;wave=1;waveKills=0;lives=3;iframes=0;
  cfg=waveConfig(1);
  spawnTimer=800;
  dead=false;running=true;
  scoreEl.textContent=0;waveEl.textContent=1;bestEl.textContent=best;
  renderLives();renderPerkBar();puBar.innerHTML='';
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

// ── SHOOTING: player can shoot at enemies with spacebar/click ──
let shootCooldown=0;
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='z'||e.key==='Z') && running && !dead){
    shootNearest();
  }
});
canvas.addEventListener('click',e=>{
  if(running && !dead) shootNearest();
});
canvas.addEventListener('touchend',e=>{
  // only shoot if not dragging
  if(running && !dead && touchX===null) shootNearest();
});

function shootNearest(){
  if(Date.now()-shootCooldown<400) return;
  shootCooldown=Date.now();
  if(!enemies.length) return;
  let nearest=null,nd=Infinity;
  enemies.forEach(e=>{
    const d=Math.hypot(e.x-player.x,e.y-player.y);
    if(d<nd){nd=d;nearest=e;}
  });
  if(!nearest) return;
  const a=Math.atan2(nearest.y-player.y,nearest.x-player.x);
  // player bullet (cyan, damages enemy)
  playerBullets.push({x:player.x,y:player.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,r:5,life:1,target:nearest.id});
  mkParticle(player.x,player.y,'#00e5ff',4);
}

let playerBullets=[];
// patch update to handle player bullets
const _origUpdate=update;
function update(dt){
  if(dead) return;
  iframes=Math.max(0,iframes-dt);

  const {dx,dy}=getInput();
  const spd=player.speed*(hasPerk('slow')?1.15:1);
  player.x=Math.max(player.r,Math.min(canvas.width-player.r, player.x+dx*spd));
  player.y=Math.max(player.r,Math.min(canvas.height-player.r, player.y+dy*spd));
  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>14) player.trail.shift();
  if(player.shielded){player.shieldTimer-=dt;if(player.shieldTimer<=0){player.shielded=false;removePerk('shield');}}
  activePerks.forEach(p=>p.timer-=dt);
  activePerks=activePerks.filter(p=>p.timer>0);
  renderPerkBar();

  spawnTimer-=dt;
  if(spawnTimer<=0){spawnTimer=cfg.spawnInterval;spawnEnemy();}

  enemies.forEach(e=>{
    const ddx=player.x-e.x,ddy=player.y-e.y,dist=Math.hypot(ddx,ddy);
    e.x+=ddx/dist*e.speed*(hasPerk('slow')?0.45:1);
    e.y+=ddy/dist*e.speed*(hasPerk('slow')?0.45:1);
    if(e.type==='basic'||e.type==='tank'){
      e.shootTimer-=(dt*(hasPerk('slow')?0.45:1));
      if(e.shootTimer<=0){
        e.shootTimer=cfg.shootInterval+(Math.random()*400);
        const a=Math.atan2(player.y-e.y,player.x-e.x);
        const sp2=cfg.bulletSpeed+(e.type==='tank'?0.5:0);
        bullets.push(mkBullet(e.x,e.y,Math.cos(a)*sp2,Math.sin(a)*sp2,e.type==='tank'?7:5,e.type==='tank'?'#ff8800':'#ff3366'));
      }
    }
    if(e.type==='fast'){
      e.shootTimer-=(dt*(hasPerk('slow')?0.45:1));
      if(e.shootTimer<=0){
        e.shootTimer=(cfg.shootInterval*1.6)+(Math.random()*300);
        const base=Math.atan2(player.y-e.y,player.x-e.x);
        [-0.25,0,0.25].forEach(off=>{
          bullets.push(mkBullet(e.x,e.y,Math.cos(base+off)*cfg.bulletSpeed*1.2,Math.sin(base+off)*cfg.bulletSpeed*1.2,4,'#ff00cc'));
        });
      }
    }
    if(dist<e.r+player.r&&iframes<=0&&!player.shielded) hit();
  });

  // player bullets hitting enemies
  playerBullets.forEach(pb=>{
    pb.x+=pb.vx*(hasPerk('slow')?0.6:1);
    pb.y+=pb.vy*(hasPerk('slow')?0.6:1);
    if(pb.x<-20||pb.x>canvas.width+20||pb.y<-20||pb.y>canvas.height+20){pb.life=0;return;}
    enemies.forEach(e=>{
      if(e.life<=0) return;
      if(Math.hypot(pb.x-e.x,pb.y-e.y)<pb.r+e.r){
        pb.life=0;
        e.hp--;
        mkParticle(pb.x,pb.y,'#00e5ff',4);
        if(e.hp<=0) killEnemy(e,pb.x,pb.y);
      }
    });
  });
  playerBullets=playerBullets.filter(b=>b.life>0);
  enemies=enemies.filter(e=>e.life>0);

  bullets.forEach(b=>{
    b.x+=b.vx*(hasPerk('slow')?0.45:1);
    b.y+=b.vy*(hasPerk('slow')?0.45:1);
    if(b.x<-20||b.x>canvas.width+20||b.y<-20||b.y>canvas.height+20){b.life=0;return;}
    if(Math.hypot(b.x-player.x,b.y-player.y)<b.r+player.r){
      b.life=0;
      if(player.shielded){mkParticle(b.x,b.y,'#4488ff',6);}
      else if(iframes<=0){hit();}
    }
  });
  bullets=bullets.filter(b=>b.life>0);

  powerups.forEach(p=>{
    p.bob+=0.05;
    if(hasPerk('magnet')){const ddx=player.x-p.x,ddy=player.y-p.y,d=Math.hypot(ddx,ddy);if(d<150){p.x+=ddx/d*4;p.y+=ddy/d*4;}}
    if(Math.hypot(p.x-player.x,p.y-player.y)<p.r+player.r){collectPerk(p.type);p.life=0;mkParticle(p.x,p.y,p.color,10);}
  });
  powerups=powerups.filter(p=>p.life>0);

  orbs.forEach(o=>{
    const ddx=player.x-o.x,ddy=player.y-o.y,d=Math.hypot(ddx,ddy);
    if(hasPerk('magnet')||d<80){o.x+=ddx/d*5;o.y+=ddy/d*5;}
    if(d<o.r+player.r){score+=5;scoreEl.textContent=Math.floor(score);scorePopups.push({x:o.x,y:o.y,text:'+5',life:1,color:'#ffd700'});o.life=0;}
  });
  orbs=orbs.filter(o=>o.life>0);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.92;p.vy*=0.92});
  particles=particles.filter(p=>p.life>0);
  scorePopups.forEach(p=>{p.y-=0.8;p.life-=0.025});
  scorePopups=scorePopups.filter(p=>p.life>0);
  score+=dt*0.01*wave;
  scoreEl.textContent=Math.floor(score);
}

// patch draw to include player bullets
const _origDraw=draw;
function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#090912';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  orbs.forEach(o=>{ctx.globalAlpha=0.8;ctx.fillStyle='#ffd700';ctx.shadowBlur=8;ctx.shadowColor='#ffd700';ctx.beginPath();ctx.arc(o.x,o.y,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
  ctx.globalAlpha=1;

  powerups.forEach(p=>{
    ctx.globalAlpha=0.9;ctx.fillStyle=p.color;ctx.shadowBlur=12;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
    ctx.font='11px sans-serif';ctx.textAlign='center';
    const icons={shield:'🛡',slow:'❄',magnet:'🧲'};
    ctx.fillText(icons[p.type]||'?',p.x,p.y+4);
  });
  ctx.globalAlpha=1;

  // player bullets
  playerBullets.forEach(pb=>{
    ctx.fillStyle='#00ffff';ctx.shadowBlur=8;ctx.shadowColor='#00ffff';
    ctx.beginPath();ctx.arc(pb.x,pb.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });

  bullets.forEach(b=>{ctx.fillStyle=b.color;ctx.shadowBlur=8;ctx.shadowColor=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});

  enemies.forEach(e=>{
    ctx.fillStyle=e.color;ctx.shadowBlur=12;ctx.shadowColor=e.color;
    if(e.type==='tank'){
      ctx.fillRect(e.x-e.r,e.y-e.r,e.r*2,e.r*2);
      ctx.fillStyle='#111';ctx.fillRect(e.x-e.r,e.y-e.r-9,e.r*2,4);
      ctx.fillStyle='#ff8800';ctx.fillRect(e.x-e.r,e.y-e.r-9,e.r*2*(e.hp/e.maxHp),4);
    } else {
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  });

  player.trail.forEach((t,i)=>{ctx.globalAlpha=(i/player.trail.length)*0.3;ctx.fillStyle='#00e5ff';ctx.beginPath();ctx.arc(t.x,t.y,player.r*0.5,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  const shimmer=iframes>0&&Math.floor(iframes/100)%2===0;
  if(!shimmer){
    if(player.shielded){ctx.strokeStyle='#4488ff';ctx.lineWidth=3;ctx.shadowBlur=16;ctx.shadowColor='#4488ff';ctx.beginPath();ctx.arc(player.x,player.y,player.r+5,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}
    ctx.fillStyle='#00e5ff';ctx.shadowBlur=16;ctx.shadowColor='#00e5ff';
    ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(player.x,player.y,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  scorePopups.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);});
  ctx.globalAlpha=1;

  // wave progress bar
  const prog=Math.min(waveKills/cfg.killsNeeded,1);
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(0,H-4,W,4);
  ctx.fillStyle='#ffd700';ctx.fillRect(0,H-4,W*prog,4);
}

// init
bestEl.textContent=best;
renderLives();
drawIdle();
showOverlay(false);
</script>
